<!DOCTYPE html>
<html lang="ja" class="invisible-scrollbar">
<head>
    <meta charset="UTF-8">
    <title>Word Float</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="static/style.css">
</head>
<body>
    <div class="header">
        <button class="hamburger" aria-label="メニュー" aria-controls="nav-menu" aria-expanded="false" onclick="toggleMenu(this)">
            <span class="hamburger__line"></span>
            <span class="hamburger__line"></span>
            <span class="hamburger__line"></span>
        </button>

        <nav id="nav-menu" class="nav" aria-hidden="true">
            <header class="nav__header">
                <h2 class="nav__title">Word Float</h2>
            </header>

            <div class="nav__body invisible-scrollbar">
                <details class="nav__accordion">
                    <summary class="nav__accordion-header">
                        <h3>About</h3>
                    </summary>
                    <div class="nav__accordion-body">
                        <p class="nav__about-text">このサイトは、最新ニュースを取得し、単語の出現頻度を可視化するWebアプリケーションです。単語は出現頻度が高いほど大きく表示され、物理演算によって画面内を漂います。</p>
                    </div>
                </details>
                <details class="nav__accordion">
                    <summary class="nav__accordion-header">
                        <h3>Settings</h3>
                    </summary>
                    <div class="nav__accordion-body">
                        <label for="category-select">Category</label>
                        <select id="category-select">
                            <option value="general">General</option>
                            <option value="business">Business</option>
                            <option value="entertainment">Entertainment</option>
                            <option value="health">Health</option>
                            <option value="science">Science</option>
                            <option value="sports">Sports</option>
                            <option value="technology">Technology</option>
                        </select>

                        <label for="word-count">Top N</label>
                        <input type="number" id="word-count" value="50" step="1" min="10" max="100"  />

                        <label for="friction-air">Air Resistance</label>
                        <input type="number" id="friction-air" value="0.001" step="0.001" min="0" max="1" />

                        <label for="restitution">Restitution Coefficient</label>
                        <input type="number" id="restitution" value="1" step="0.1" min="0" max="2" />

                        <label for="max-speed">Max Speed</label>
                        <input type="number" id="max-speed" value="30" step="1" min="1" max="100" />

                        <label for="excluded-words-input">Excluded Word</label>
                        <div class="excluded-words" id="excluded-words-container">
                            <input type="text" id="excluded-words-input" class="excluded-words-input" placeholder="テキストを入力してEnter">
                        </div>

                        <button onclick="reloadWords()">Reload</button>
                    </div>
                </details>
            </div>
        </nav>
    </div>

    <canvas id="world"></canvas>

    <div class="content">
        <h2 class="content__title">Articles</h2>
        <div id="news-container"></div>
    </div>

    <script>
    document.querySelector('canvas').addEventListener('wheel', (event) => {}, { passive: true });

    const input = document.getElementById('excluded-words-input');
    const container = document.getElementById('excluded-words-container');

    function createLable(text) {
        const label = document.createElement('div');
        label.className = 'excluded-words-label';

        const span = document.createElement('span');
        span.className = 'excluded-words-text';
        span.textContent = text;

        const removeBtn = document.createElement('div');
        removeBtn.className = 'excluded-words-remove';

        label.appendChild(span);
        label.appendChild(removeBtn);

        label.addEventListener('click', () => label.remove());

        container.insertBefore(label, input);
    }

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && input.value.trim() !== '') {
        createLable(input.value.trim());
        input.value = '';
      }
    });

    // ラベル以外の領域クリック時に入力フォーカス
    container.addEventListener('click', (e) => {
      if (e.target === container) {
        input.style.opacity = '1';
        input.style.pointerEvents = 'auto';
        input.style.position = 'static';
        input.style.width = '200px';
        input.style.height = 'auto';
        input.style.border = 'none';
        input.style.outline = 'none';
        input.style.boxShadow = 'none';
        input.focus();
      }
    });

    // 入力フィールド外クリックで再び非表示に
    document.addEventListener('click', (e) => {
      if (!container.contains(e.target)) {
        input.style.opacity = '0';
        input.style.pointerEvents = 'none';
        input.style.position = 'absolute';
        input.style.width = '0';
        input.style.height = '0';
        input.style.border = 'none';
        input.style.outline = 'none';
        input.style.boxShadow = 'none';
      }
    });

    const default_excluded_words = [
      '#Articles', '#Conjunctions', '#Prepositions', '#Pronouns', '#Be-verbs', '#Auxiliary Verbs', '#Common Adverbs & Others'
    ];
    default_excluded_words.forEach(w => createLable(w));
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="static/script.js"></script>
    </body>
</html>
